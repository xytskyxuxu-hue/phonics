<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自然拼读 SH 组合 - 跟读学习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .instruction {
            background: rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 16px 24px;
            margin-bottom: 30px;
            color: white;
            text-align: center;
            font-size: 1.1em;
        }

        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
        }

        .word-card {
            background: white;
            border-radius: 20px;
            padding: 24px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .word-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .word-card.playing {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            transform: scale(1.05);
        }

        .word-card .word {
            font-size: 2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            transition: color 0.3s;
        }

        .word-card.playing .word {
            color: white;
        }

        .word-card .phonetic {
            font-size: 1em;
            color: #888;
            margin-bottom: 12px;
            font-style: italic;
        }

        .word-card.playing .phonetic {
            color: rgba(255,255,255,0.8);
        }

        .word-card .meaning {
            font-size: 1.1em;
            color: #666;
            background: #f0f0f0;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
        }

        .word-card.playing .meaning {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .word-card .icon {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 1.5em;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .word-card.playing .icon {
            opacity: 1;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            color: rgba(255,255,255,0.7);
            font-size: 0.9em;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .word-card.playing .icon {
            animation: pulse 0.6s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 自然拼读 SH 组合</h1>
            <p>点击单词，听发音，跟读练习</p>
        </header>

        <div class="instruction">
            👆 点击下方任意单词卡片，聆听发音，试着跟读两遍！
        </div>

        <div class="word-grid" id="wordGrid"></div>

        <div class="footer">
            <p>🎵 使用 Safari 浏览器效果最佳</p>
        </div>
    </div>

    <script>
        const words = [
            { word: 'fish',    phonetic: '/fɪʃ/',  meaning: '鱼' },
            { word: 'shop',   phonetic: '/ʃɒp/',  meaning: '商店' },
            { word: 'dish',   phonetic: '/dɪʃ/',  meaning: '盘子' },
            { word: 'wish',   phonetic: '/wɪʃ/',  meaning: '希望' },
            { word: 'ship',   phonetic: '/ʃɪp/',  meaning: '轮船' },
            { word: 'hush',   phonetic: '/hʌʃ/',  meaning: '安静' },
            { word: 'shed',   phonetic: '/ʃed/',  meaning: '棚子' },
            { word: 'brush',  phonetic: '/brʌʃ/', meaning: '刷子' },
            { word: 'smash',  phonetic: '/smæʃ/', meaning: '打碎' },
            { word: 'shelf',  phonetic: '/ʃelf/', meaning: '架子' },
            { word: 'shock',  phonetic: '/ʃɒk/',  meaning: '震惊' },
            { word: 'shin',   phonetic: '/ʃɪn/',  meaning: '小腿' },
            { word: 'shut',   phonetic: '/ʃʌt/',  meaning: '关闭' },
            { word: 'rash',   phonetic: '/ræʃ/',  meaning: '皮疹' },
            { word: 'flush',  phonetic: '/flʌʃ/', meaning: '脸红' },
            { word: 'crash',  phonetic: '/kræʃ/', meaning: '碰撞' },
            { word: 'mash',   phonetic: '/mæʃ/',  meaning: '捣碎' },
            { word: 'shift',  phonetic: '/ʃɪft/', meaning: '转移' },
            { word: 'flesh',  phonetic: '/fleʃ/', meaning: '肉' },
            { word: 'shunt',  phonetic: '/ʃʌnt/', meaning: '分流' },
            { word: 'cash',   phonetic: '/kæʃ/',  meaning: '现金' },
            { word: 'dash',   phonetic: '/dæʃ/',  meaning: '飞奔' },
            { word: 'shell',  phonetic: '/ʃel/',  meaning: '贝壳' },
            { word: 'lash',   phonetic: '/læʃ/',  meaning: '鞭打' },
            { word: 'shot',   phonetic: '/ʃɒt/',  meaning: '射击' },
            { word: 'flash',  phonetic: '/flæʃ/', meaning: '闪光' },
            { word: 'bash',   phonetic: '/bæʃ/',  meaning: '猛击' },
            { word: 'splash', phonetic: '/splæʃ/', meaning: '溅水' },
            { word: 'blush',  phonetic: '/blʌʃ/', meaning: '脸红' },
            { word: 'shack',  phonetic: '/ʃæk/',  meaning: '棚屋' }
        ];

        let currentUtterance = null;
        let voice = null;

        // 初始化语音
        function initVoice() {
            const voices = speechSynthesis.getVoices();
            // 优先选择 macOS 高质量语音
            voice = voices.find(v => v.name === 'Samantha') ||
                    voices.find(v => v.name === 'Siri') ||
                    voices.find(v => v.name === 'Alex') ||
                    voices.find(v => v.name.includes('Premium')) ||
                    voices.find(v => v.lang.includes('en') && v.name.includes('English')) ||
                    voices.find(v => v.lang.includes('en-US')) ||
                    voices.find(v => v.lang.includes('en')) ||
                    voices[0];
        }

        // 等待语音加载
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => {
                initVoice();
            };
        }
        setTimeout(initVoice, 100);

        // 渲染单词卡片
        function renderCards() {
            const grid = document.getElementById('wordGrid');
            words.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'word-card';
                card.innerHTML = `
                    <span class="icon">🔊</span>
                    <div class="word">${item.word}</div>
                    <div class="phonetic">${item.phonetic}</div>
                    <div class="meaning">${item.meaning}</div>
                `;
                card.addEventListener('click', () => speakWord(item, card));
                grid.appendChild(card);
            });
        }

        // 发音函数 - 整读2遍
        function speakWord(item, card) {
            // 停止之前的朗读
            speechSynthesis.cancel();

            // 移除其他卡片的播放状态
            document.querySelectorAll('.word-card').forEach(c => c.classList.remove('playing'));

            // 添加播放状态
            card.classList.add('playing');

            // 创建朗读
            function speak() {
                const utterance = new SpeechSynthesisUtterance(item.word);
                utterance.lang = 'en-US';
                utterance.rate = 0.75;
                utterance.pitch = 1;
                if (voice) {
                    utterance.voice = voice;
                }

                utterance.onend = () => {
                    card.classList.remove('playing');
                };

                utterance.onerror = () => {
                    card.classList.remove('playing');
                };

                currentUtterance = utterance;
                speechSynthesis.speak(utterance);
            }

            speak();
        }

        // 页面加载时渲染卡片
        renderCards();
    </script>
</body>
</html>
