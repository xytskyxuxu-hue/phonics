<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自然拼读 Phonics 练习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 960px; margin: 0 auto; }

        header {
            text-align: center;
            color: white;
            margin-bottom: 24px;
        }

        header h1 { font-size: 2.2em; margin-bottom: 6px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        header p { font-size: 1.1em; opacity: 0.85; }

        /* ─── Topic Filter ─── */
        .topic-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 4px 14px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .topic-scroll::-webkit-scrollbar { display: none; }

        .topic-btn {
            flex-shrink: 0;
            background: rgba(255,255,255,0.2);
            border: 2px solid transparent;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.25s;
            white-space: nowrap;
        }
        .topic-btn:hover { background: rgba(255,255,255,0.35); }
        .topic-btn.active {
            background: white;
            color: #667eea;
            font-weight: 600;
            border-color: white;
        }

        /* ─── Status Filter ─── */
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .status-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.25s;
        }
        .status-btn.active { background: rgba(255,255,255,0.9); color: #667eea; font-weight: 600; }
        .status-btn:hover { background: rgba(255,255,255,0.3); }

        /* ─── Instruction ─── */
        .instruction {
            background: rgba(255,255,255,0.15);
            border-radius: 14px;
            padding: 12px 20px;
            margin-bottom: 22px;
            color: white;
            text-align: center;
            font-size: 1em;
        }

        /* ─── Word Grid ─── */
        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
            gap: 12px;
        }

        .word-card {
            background: white;
            border-radius: 16px;
            padding: 18px 12px 14px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        .word-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
        .word-card.playing {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            transform: scale(1.05);
        }
        .word-card.learned { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .word-card.learned.playing { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }

        .word-card .badge {
            position: absolute; top: -4px; right: -4px;
            background: #11998e; color: white;
            font-size: 0.7em; font-weight: bold;
            padding: 5px 9px; border-radius: 20px;
            transform: rotate(12deg);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            display: none;
        }
        .word-card.learned .badge { display: block; }

        .word-card .sound-icon {
            position: absolute; top: 8px; right: 10px;
            font-size: 1.2em; opacity: 0; transition: opacity 0.3s;
        }
        .word-card.playing .sound-icon { opacity: 1; animation: pulse 0.6s ease-in-out infinite; }

        .word-card .word {
            font-size: 1.65em; font-weight: bold; color: #333;
            margin-bottom: 4px; transition: color 0.3s;
        }
        .word-card.playing .word,
        .word-card.learned .word { color: white; }

        .word-card .phonetic {
            font-size: 0.82em; color: #999; margin-bottom: 8px; font-style: italic;
        }
        .word-card.playing .phonetic,
        .word-card.learned .phonetic { color: rgba(255,255,255,0.8); }

        /* th 双发音 badge */
        .word-card .th-type {
            font-size: 0.72em;
            padding: 2px 8px;
            border-radius: 10px;
            margin-bottom: 6px;
            display: inline-block;
        }
        .th-voiced  { background: #ffe0e0; color: #c0392b; }
        .th-unvoiced { background: #e0f0ff; color: #1a6fa0; }
        .word-card.playing .th-type,
        .word-card.learned .th-type { background: rgba(255,255,255,0.25); color: white; }

        .word-card .meaning {
            font-size: 0.92em; color: #666;
            background: #f2f2f2; padding: 4px 10px;
            border-radius: 14px; display: inline-block;
            transition: all 0.3s;
        }
        .word-card.playing .meaning,
        .word-card.learned .meaning {
            background: rgba(255,255,255,0.2); color: white;
        }

        .word-card .learn-btn {
            position: absolute; bottom: 7px; right: 7px;
            width: 26px; height: 26px;
            border-radius: 50%; border: 2px solid #ddd;
            background: white; color: #11998e;
            font-size: 0.75em; cursor: pointer;
            transition: all 0.3s;
            display: flex; align-items: center; justify-content: center;
            opacity: 0.65;
        }
        .word-card .learn-btn:hover { opacity: 1; transform: scale(1.15); }
        .word-card.learned .learn-btn { background: white; border-color: white; opacity: 1; }

        /* ─── Footer ─── */
        .footer {
            text-align: center;
            margin-top: 36px;
            color: rgba(255,255,255,0.7);
            font-size: 0.9em;
        }
        .reset-btn {
            background: rgba(255,255,255,0.15);
            border: 2px solid white;
            color: white;
            padding: 9px 22px;
            border-radius: 22px;
            font-size: 0.9em;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.3s;
        }
        .reset-btn:hover { background: white; color: #667eea; }

        .empty-state {
            text-align: center; color: white;
            padding: 60px 20px; font-size: 1.2em;
            grid-column: 1 / -1;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
    </style>
</head>

// Flatten all words (excluding 'all' topic)
const allWords = topics.slice(1).flatMap(t =>
    t.words.map(w => ({ ...w, topicId: t.id }))
);

// ─────────────────────────────────────────
//  State
// ─────────────────────────────────────────
let learnedWords = JSON.parse(localStorage.getItem('phonics-learned-v2') || '[]');
let currentTopic  = 'all';
let currentStatus = 'all';
let voice = null;

// ─────────────────────────────────────────
//  Voice
// ─────────────────────────────────────────
function initVoice() {
    const voices = speechSynthesis.getVoices();
    voice =
        voices.find(v => v.name === 'Samantha') ||
        voices.find(v => v.name.includes('Google US English')) ||
        voices.find(v => v.name === 'Alex') ||
        voices.find(v => v.name.includes('Premium') && v.lang.startsWith('en')) ||
        voices.find(v => v.lang === 'en-US') ||
        voices.find(v => v.lang.startsWith('en')) ||
        voices[0];
}
if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = initVoice;
}
setTimeout(initVoice, 100);

function speakWord(word, card) {
    speechSynthesis.cancel();
    document.querySelectorAll('.word-card').forEach(c => c.classList.remove('playing'));
    card.classList.add('playing');
    const utt = new SpeechSynthesisUtterance(word);
    utt.lang  = 'en-US';
    utt.rate  = 0.75;
    utt.pitch = 1;
    if (voice) utt.voice = voice;
    utt.onend  = () => card.classList.remove('playing');
    utt.onerror = () => card.classList.remove('playing');
    speechSynthesis.speak(utt);
}

// ─────────────────────────────────────────
//  Filtered word list
// ─────────────────────────────────────────
function getFilteredWords() {
    let list = currentTopic === 'all' ? allWords :
        allWords.filter(w => w.topicId === currentTopic);
    if (currentStatus === 'learned')   list = list.filter(w => learnedWords.includes(w.word + '_' + w.topicId));
    if (currentStatus === 'unlearned') list = list.filter(w => !learnedWords.includes(w.word + '_' + w.topicId));
    return list;
}

function isLearned(w) {
    return learnedWords.includes(w.word + '_' + w.topicId);
}
function toggleLearn(w, card, e) {
    e.stopPropagation();
    const key = w.word + '_' + w.topicId;
    const idx = learnedWords.indexOf(key);
    if (idx > -1) { learnedWords.splice(idx, 1); card.classList.remove('learned'); }
    else           { learnedWords.push(key);       card.classList.add('learned');    }
    localStorage.setItem('phonics-learned-v2', JSON.stringify(learnedWords));
    updateStats();
}

// ─────────────────────────────────────────
//  Render
// ─────────────────────────────────────────
function renderTopics() {
    const scroll = document.getElementById('topicScroll');
    scroll.innerHTML = topics.map(t => `
        <button class="topic-btn ${t.id === currentTopic ? 'active' : ''}" data-id="${t.id}">
            ${t.label}
        </button>`).join('');
    scroll.querySelectorAll('.topic-btn').forEach(btn =>
        btn.addEventListener('click', () => {
            currentTopic = btn.dataset.id;
            renderTopics();
            renderCards();
            updateStats();
        })
    );
}

function thBadge(thType) {
    if (!thType) return '';
    const label = thType === 'voiced' ? '/ð/ 浊音' : '/θ/ 清音';
    return `<div class="th-type ${thType === 'voiced' ? 'th-voiced' : 'th-unvoiced'}">${label}</div>`;
}

function renderCards() {
    const grid = document.getElementById('wordGrid');
    const list = getFilteredWords();
    if (list.length === 0) {
        grid.innerHTML = `<div class="empty-state">
            ${currentStatus === 'learned' ? '🎉 还没有标记任何单词' : '🎊 太棒了！全部学完！'}
        </div>`;
        return;
    }
    grid.innerHTML = '';
    list.forEach(item => {
        const card = document.createElement('div');
        card.className = 'word-card' + (isLearned(item) ? ' learned' : '');
        card.innerHTML = `
            <span class="badge">GET ✓</span>
            <span class="sound-icon">🔊</span>
            ${thBadge(item.thType)}
            <div class="word">${item.word}</div>
            <div class="phonetic">${item.phonetic}</div>
            <div class="meaning">${item.meaning}</div>
            <button class="learn-btn" title="标记已学会">✓</button>
        `;
        card.addEventListener('click', e => {
            if (!e.target.classList.contains('learn-btn')) speakWord(item.word, card);
        });
        card.querySelector('.learn-btn').addEventListener('click', e => toggleLearn(item, card, e));
        grid.appendChild(card);
    });
}

function updateStats() {
    const topicWords = currentTopic === 'all' ? allWords :
        allWords.filter(w => w.topicId === currentTopic);
    const learnedCount = topicWords.filter(w => isLearned(w)).length;
    const total = topicWords.length;
    document.getElementById('totalCount').textContent     = total;
    document.getElementById('learnedCount').textContent   = learnedCount;
    document.getElementById('unlearnedCount').textContent = total - learnedCount;
}

// ─────────────────────────────────────────
//  Status filter
// ─────────────────────────────────────────
document.querySelectorAll('.status-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentStatus = btn.dataset.status;
        renderCards();
    });
});

// Reset
document.getElementById('resetBtn').addEventListener('click', () => {
    if (confirm('确定要重置所有学习进度吗？')) {
        learnedWords = [];
        localStorage.removeItem('phonics-learned-v2');
        updateStats();
        renderCards();
    }
});

// ─────────────────────────────────────────
//  Init
// ─────────────────────────────────────────
renderTopics();
renderCards();
updateStats();
</script>
