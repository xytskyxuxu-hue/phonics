<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自然拼读 SH 组合 - 跟读学习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .stat-btn.active {
            background: white;
            color: #667eea;
        }

        .stat-btn:hover {
            transform: scale(1.05);
        }

        .instruction {
            background: rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 16px 24px;
            margin-bottom: 30px;
            color: white;
            text-align: center;
            font-size: 1.1em;
        }

        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 14px;
        }

        .word-card {
            background: white;
            border-radius: 16px;
            padding: 20px 14px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .word-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .word-card.playing {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            transform: scale(1.05);
        }

        .word-card.learned {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .word-card.learned.playing {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .word-card .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #11998e;
            color: white;
            font-size: 0.75em;
            font-weight: bold;
            padding: 6px 10px;
            border-radius: 20px;
            transform: rotate(12deg);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            display: none;
        }

        .word-card.learned .badge {
            display: block;
        }

        .word-card .icon {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 1.3em;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .word-card.playing .icon {
            opacity: 1;
        }

        .word-card .word {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
            margin-bottom: 6px;
            transition: color 0.3s;
        }

        .word-card.playing .word,
        .word-card.learned .word {
            color: white;
        }

        .word-card .phonetic {
            font-size: 0.9em;
            color: #888;
            margin-bottom: 10px;
            font-style: italic;
        }

        .word-card.playing .phonetic,
        .word-card.learned .phonetic {
            color: rgba(255,255,255,0.8);
        }

        .word-card .meaning {
            font-size: 1em;
            color: #666;
            background: #f0f0f0;
            padding: 5px 10px;
            border-radius: 15px;
            display: inline-block;
            transition: all 0.3s;
        }

        .word-card.playing .meaning,
        .word-card.learned .meaning {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .word-card .learn-btn {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid #ddd;
            background: white;
            color: #11998e;
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.7;
        }

        .word-card .learn-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .word-card.learned .learn-btn {
            background: white;
            border-color: white;
            opacity: 1;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            color: rgba(255,255,255,0.7);
            font-size: 0.9em;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .word-card.playing .icon {
            animation: pulse 0.6s ease-in-out infinite;
        }

        .empty-state {
            text-align: center;
            color: white;
            padding: 60px 20px;
            font-size: 1.3em;
        }

        .reset-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.95em;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .reset-btn:hover {
            background: white;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 自然拼读 SH 组合</h1>
            <p>点击单词，听发音，跟读练习</p>
        </header>

        <div class="stats">
            <button class="stat-btn active" data-filter="all">全部 <span id="totalCount">30</span></button>
            <button class="stat-btn" data-filter="unlearned">未学会 <span id="unlearnedCount">30</span></button>
            <button class="stat-btn" data-filter="learned">已学会 <span id="learnedCount">0</span></button>
        </div>

        <div class="instruction">
            👆 点击卡片听发音 | 点击右下角 ✓ 标记已学会
        </div>

        <div class="word-grid" id="wordGrid"></div>

        <div class="footer">
            <p>🎵 使用 Safari 浏览器效果最佳</p>
            <button class="reset-btn" id="resetBtn">🔄 重置学习进度</button>
        </div>
    </div>

    <script>
        const words = [
            { word: 'fish',    phonetic: '/fɪʃ/',  meaning: '鱼' },
            { word: 'shop',   phonetic: '/ʃɒp/',  meaning: '商店' },
            { word: 'dish',   phonetic: '/dɪʃ/',  meaning: '盘子' },
            { word: 'wish',   phonetic: '/wɪʃ/',  meaning: '希望' },
            { word: 'ship',   phonetic: '/ʃɪp/',  meaning: '轮船' },
            { word: 'hush',   phonetic: '/hʌʃ/',  meaning: '安静' },
            { word: 'shed',   phonetic: '/ʃed/',  meaning: '棚子' },
            { word: 'brush',  phonetic: '/brʌʃ/', meaning: '刷子' },
            { word: 'smash',  phonetic: '/smæʃ/', meaning: '打碎' },
            { word: 'shelf',  phonetic: '/ʃelf/', meaning: '架子' },
            { word: 'shock',  phonetic: '/ʃɒk/',  meaning: '震惊' },
            { word: 'shin',   phonetic: '/ʃɪn/',  meaning: '小腿' },
            { word: 'shut',   phonetic: '/ʃʌt/',  meaning: '关闭' },
            { word: 'rash',   phonetic: '/ræʃ/',  meaning: '皮疹' },
            { word: 'flush',  phonetic: '/flʌʃ/', meaning: '脸红' },
            { word: 'crash',  phonetic: '/kræʃ/', meaning: '碰撞' },
            { word: 'mash',   phonetic: '/mæʃ/',  meaning: '捣碎' },
            { word: 'shift',  phonetic: '/ʃɪft/', meaning: '转移' },
            { word: 'flesh',  phonetic: '/fleʃ/', meaning: '肉' },
            { word: 'shunt',  phonetic: '/ʃʌnt/', meaning: '分流' },
            { word: 'cash',   phonetic: '/kæʃ/',  meaning: '现金' },
            { word: 'dash',   phonetic: '/dæʃ/',  meaning: '飞奔' },
            { word: 'shell',  phonetic: '/ʃel/',  meaning: '贝壳' },
            { word: 'lash',   phonetic: '/læʃ/',  meaning: '鞭打' },
            { word: 'shot',   phonetic: '/ʃɒt/',  meaning: '射击' },
            { word: 'flash',  phonetic: '/flæʃ/', meaning: '闪光' },
            { word: 'bash',   phonetic: '/bæʃ/',  meaning: '猛击' },
            { word: 'splash', phonetic: '/splæʃ/', meaning: '溅水' },
            { word: 'blush',  phonetic: '/blʌʃ/', meaning: '脸红' },
            { word: 'shack',  phonetic: '/ʃæk/',  meaning: '棚屋' }
        ];

        let currentUtterance = null;
        let voice = null;
        let learnedWords = JSON.parse(localStorage.getItem('phonics-learned') || '[]');
        let currentFilter = 'all';

        // 初始化语音
        function initVoice() {
            const voices = speechSynthesis.getVoices();
            voice = voices.find(v => v.name === 'Samantha') ||
                    voices.find(v => v.name === 'Siri') ||
                    voices.find(v => v.name === 'Alex') ||
                    voices.find(v => v.name.includes('Premium')) ||
                    voices.find(v => v.lang.includes('en') && v.name.includes('English')) ||
                    voices.find(v => v.lang.includes('en-US')) ||
                    voices.find(v => v.lang.includes('en')) ||
                    voices[0];
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => initVoice();
        }
        setTimeout(initVoice, 100);

        // 更新统计数据
        function updateStats() {
            const learned = learnedWords.length;
            const total = words.length;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('learnedCount').textContent = learned;
            document.getElementById('unlearnedCount').textContent = total - learned;
        }

        // 切换学习状态
        function toggleLearn(word, card, e) {
            e.stopPropagation();
            
            const index = learnedWords.indexOf(word);
            if (index > -1) {
                learnedWords.splice(index, 1);
                card.classList.remove('learned');
            } else {
                learnedWords.push(word);
                card.classList.add('learned');
            }
            
            localStorage.setItem('phonics-learned', JSON.stringify(learnedWords));
            updateStats();
        }

        // 渲染卡片
        function renderCards() {
            const grid = document.getElementById('wordGrid');
            grid.innerHTML = '';
            
            const filteredWords = currentFilter === 'all' ? words :
                currentFilter === 'learned' ? words.filter(w => learnedWords.includes(w.word)) :
                words.filter(w => !learnedWords.includes(w.word));

            if (filteredWords.length === 0) {
                grid.innerHTML = `<div class="empty-state">
                    ${currentFilter === 'learned' ? '🎉 还没有标记任何单词为已学会' : '🎊 太棒了！所有单词都已学会！'}
                </div>`;
                return;
            }

            filteredWords.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'word-card' + (learnedWords.includes(item.word) ? ' learned' : '');
                card.innerHTML = `
                    <span class="badge">GET ✓</span>
                    <span class="icon">🔊</span>
                    <div class="word">${item.word}</div>
                    <div class="phonetic">${item.phonetic}</div>
                    <div class="meaning">${item.meaning}</div>
                    <button class="learn-btn" title="标记已学会">✓</button>
                `;
                
                card.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('learn-btn')) {
                        speakWord(item, card);
                    }
                });
                
                card.querySelector('.learn-btn').addEventListener('click', (e) => toggleLearn(item.word, card, e));
                grid.appendChild(card);
            });
        }

        // 发音函数
        function speakWord(item, card) {
            speechSynthesis.cancel();
            document.querySelectorAll('.word-card').forEach(c => c.classList.remove('playing'));
            card.classList.add('playing');

            const utterance = new SpeechSynthesisUtterance(item.word);
            utterance.lang = 'en-US';
            utterance.rate = 0.75;
            utterance.pitch = 1;
            if (voice) utterance.voice = voice;

            utterance.onend = () => card.classList.remove('playing');
            utterance.onerror = () => card.classList.remove('playing');

            currentUtterance = utterance;
            speechSynthesis.speak(utterance);
        }

        // 筛选按钮
        document.querySelectorAll('.stat-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.stat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderCards();
            });
        });

        // 重置按钮
        document.getElementById('resetBtn').addEventListener('click', () => {
            if (confirm('确定要重置所有学习进度吗？')) {
                learnedWords = [];
                localStorage.removeItem('phonics-learned');
                updateStats();
                renderCards();
            }
        });

        // 初始化
        updateStats();
        renderCards();
    </script>
</body>
</html>
